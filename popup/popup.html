<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tiny URL EmBiginator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="app" class="app">
      <div class="history-shell">
        <section id="history-panel" class="history-panel">
          <p id="history-empty" class="history-empty">No resolved URLs yet.</p>
          <ul id="history-list" class="history-list"></ul>
        </section>
      </div>
      <div class="main-shell">
        <div class="main-content">
          <div class="toolbar">
            <h1>Tiny URL EmBiginator</h1>
            <button
              id="theme-toggle-button"
              class="theme-toggle-button"
              type="button"
              aria-label="Switch to dark mode"
              title="Switch to dark mode"
            >
              <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4.25" />
                <line x1="12" y1="1.75" x2="12" y2="4.5" />
                <line x1="12" y1="19.5" x2="12" y2="22.25" />
                <line x1="1.75" y1="12" x2="4.5" y2="12" />
                <line x1="19.5" y1="12" x2="22.25" y2="12" />
                <line x1="4.4" y1="4.4" x2="6.45" y2="6.45" />
                <line x1="17.55" y1="17.55" x2="19.6" y2="19.6" />
                <line x1="4.4" y1="19.6" x2="6.45" y2="17.55" />
                <line x1="17.55" y1="6.45" x2="19.6" y2="4.4" />
              </svg>
              <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15.2 2.4a8.8 8.8 0 1 0 6.4 14.8A9.6 9.6 0 0 1 15.2 2.4Z" />
              </svg>
            </button>
          </div>
          <form id="resolve-form">
            <label for="url-input">Short URL</label>
            <input id="url-input" name="url" type="url" placeholder="https://bit.ly/xyz" required />
            <button type="submit">Resolve</button>
          </form>
          <button id="history-toggle-button" type="button" class="history-toggle-button">History</button>
          <p id="status" class="status" aria-live="polite"></p>
          <section id="result" class="result" hidden>
            <p><strong>Final URL:</strong> <a id="final-url" target="_blank" rel="noopener noreferrer"></a></p>
            <p id="host-check" class="host-check"></p>
            <button id="domain-health-button" type="button" class="health-button" disabled>Check Domain Health</button>
          <section id="domain-health-panel" class="domain-health" hidden>
              <p id="domain-health-summary" class="health-summary"></p>
              <p id="domain-health-loading" class="health-loading" hidden>Checking domain health...</p>
              <div id="domain-health-content" hidden>
                <h2>crt.sh</h2>
                <p><strong>Certificates:</strong> <span id="crt-count"></span></p>
                <p><strong>First seen:</strong> <span id="crt-first-seen"></span></p>
                <p><strong>Last seen:</strong> <span id="crt-last-seen"></span></p>
                <p><strong>Distinct names:</strong> <span id="crt-distinct-name-count"></span></p>
                <p id="crt-error" class="health-error" hidden></p>

                <h2>RDAP</h2>
                <p><strong>Registration:</strong> <span id="rdap-registration"></span></p>
                <p><strong>Last changed:</strong> <span id="rdap-last-changed"></span></p>
                <p><strong>Expiration:</strong> <span id="rdap-expiration"></span></p>
                <p><strong>Registrar:</strong> <span id="rdap-registrar"></span></p>
                <p><strong>Status:</strong> <span id="rdap-status"></span></p>
                <p id="rdap-error" class="health-error" hidden></p>
              </div>
            </section>
            <ol id="chain"></ol>
          </section>
        </div>
      </div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
